<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1120" width="800" height="1120">
  <defs>
    <!-- Background gradient: midnight coal -> ember warm -> cool steel -->
    <linearGradient id="bg" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#0c0810"/>
      <stop offset="45%" stop-color="#1a1008"/>
      <stop offset="100%" stop-color="#080c14"/>
    </linearGradient>

    <!-- Brass gradient -->
    <linearGradient id="brass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5c97a"/>
      <stop offset="60%" stop-color="#e8a857"/>
      <stop offset="100%" stop-color="#b07a32"/>
    </linearGradient>

    <!-- Ember gradient -->
    <linearGradient id="ember" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff8a4a"/>
      <stop offset="100%" stop-color="#d83a1a"/>
    </linearGradient>

    <!-- Forge floor glow (warm light from below) -->
    <radialGradient id="forgeGlow" cx="0.5" cy="1" r="0.7">
      <stop offset="0%" stop-color="#ff6b35" stop-opacity="0.18"/>
      <stop offset="50%" stop-color="#e8a857" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- Blueprint grid -->
    <pattern id="blueprint" width="40" height="40" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="40" y2="0" stroke="#3a4a52" stroke-width="0.5" opacity="0.25"/>
      <line x1="0" y1="0" x2="0" y2="40" stroke="#3a4a52" stroke-width="0.5" opacity="0.25"/>
    </pattern>

    <!-- Glow filters -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bigGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
    <filter id="titleBackdrop" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="34"/>
    </filter>

    <!-- Arrow markers -->
    <marker id="arrowBrass" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e8a857" opacity="0.7"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="1120" fill="url(#bg)"/>
  <rect width="800" height="1120" fill="url(#blueprint)"/>
  <rect width="800" height="1120" fill="url(#forgeGlow)"/>

  <!-- Ambient glow spots: hot vs. cold dialectic -->
  <circle cx="180" cy="280" r="220" fill="#ff6b35" opacity="0.04" filter="url(#bigGlow)"/>
  <circle cx="640" cy="380" r="240" fill="#e8a857" opacity="0.05" filter="url(#bigGlow)"/>
  <circle cx="400" cy="820" r="280" fill="#5ed8ff" opacity="0.03" filter="url(#bigGlow)"/>

  <!-- ===== UPPER ZONE: TURBINE / WHEEL OF BLADES (Continuous Flow) ===== -->
  <g transform="translate(400 230)">
    <!-- Outer rim -->
    <circle cx="0" cy="0" r="155" fill="none" stroke="#e8a857" stroke-width="0.8" opacity="0.3"/>
    <circle cx="0" cy="0" r="135" fill="none" stroke="#e8a857" stroke-width="0.5" opacity="0.2"/>
    <circle cx="0" cy="0" r="58" fill="none" stroke="#e8a857" stroke-width="1" opacity="0.4"/>
    <circle cx="0" cy="0" r="22" fill="none" stroke="#e8a857" stroke-width="0.8" opacity="0.5"/>
    <circle cx="0" cy="0" r="6" fill="#e8a857" opacity="0.7" filter="url(#glow)"/>

    <!-- Turbine blades: 16 swept blades -->
    <g opacity="0.55">
      <path d="M 0 -58 Q 18 -110 8 -150 L -8 -150 Q -18 -110 0 -58 Z" fill="url(#brass)" opacity="0.35" transform="rotate(0)"/>
      <path d="M 0 -58 Q 18 -110 8 -150 L -8 -150 Q -18 -110 0 -58 Z" fill="url(#brass)" opacity="0.35" transform="rotate(22.5)"/>
      <path d="M 0 -58 Q 18 -110 8 -150 L -8 -150 Q -18 -110 0 -58 Z" fill="url(#brass)" opacity="0.35" transform="rotate(45)"/>
      <path d="M 0 -58 Q 18 -110 8 -150 L -8 -150 Q -18 -110 0 -58 Z" fill="url(#brass)" opacity="0.35" transform="rotate(67.5)"/>
      <path d="M 0 -58 Q 18 -110 8 -150 L -8 -150 Q -18 -110 0 -58 Z" fill="url(#brass)" opacity="0.35" transform="rotate(90)"/>
      <path d="M 0 -58 Q 18 -110 8 -150 L -8 -150 Q -18 -110 0 -58 Z" fill="url(#brass)" opacity="0.35" transform="rotate(112.5)"/>
      <path d="M 0 -58 Q 18 -110 8 -150 L -8 -150 Q -18 -110 0 -58 Z" fill="url(#brass)" opacity="0.35" transform="rotate(135)"/>
      <path d="M 0 -58 Q 18 -110 8 -150 L -8 -150 Q -18 -110 0 -58 Z" fill="url(#brass)" opacity="0.35" transform="rotate(157.5)"/>
      <path d="M 0 -58 Q 18 -110 8 -150 L -8 -150 Q -18 -110 0 -58 Z" fill="url(#brass)" opacity="0.35" transform="rotate(180)"/>
      <path d="M 0 -58 Q 18 -110 8 -150 L -8 -150 Q -18 -110 0 -58 Z" fill="url(#brass)" opacity="0.35" transform="rotate(202.5)"/>
      <path d="M 0 -58 Q 18 -110 8 -150 L -8 -150 Q -18 -110 0 -58 Z" fill="url(#brass)" opacity="0.35" transform="rotate(225)"/>
      <path d="M 0 -58 Q 18 -110 8 -150 L -8 -150 Q -18 -110 0 -58 Z" fill="url(#brass)" opacity="0.35" transform="rotate(247.5)"/>
      <path d="M 0 -58 Q 18 -110 8 -150 L -8 -150 Q -18 -110 0 -58 Z" fill="url(#brass)" opacity="0.35" transform="rotate(270)"/>
      <path d="M 0 -58 Q 18 -110 8 -150 L -8 -150 Q -18 -110 0 -58 Z" fill="url(#brass)" opacity="0.35" transform="rotate(292.5)"/>
      <path d="M 0 -58 Q 18 -110 8 -150 L -8 -150 Q -18 -110 0 -58 Z" fill="url(#brass)" opacity="0.35" transform="rotate(315)"/>
      <path d="M 0 -58 Q 18 -110 8 -150 L -8 -150 Q -18 -110 0 -58 Z" fill="url(#brass)" opacity="0.35" transform="rotate(337.5)"/>
    </g>

    <!-- Motion arcs: rotation indicators -->
    <g fill="none" stroke="#ff8a4a" stroke-width="1.2" opacity="0.5">
      <path d="M 130 -60 A 145 145 0 0 1 145 -25" marker-end="url(#arrowBrass)"/>
      <path d="M -130 60 A 145 145 0 0 1 -145 25" marker-end="url(#arrowBrass)"/>
    </g>

    <!-- Steam/exhaust ribbons trailing -->
    <g stroke="#5ed8ff" stroke-width="0.6" opacity="0.25" fill="none">
      <path d="M 158 -10 C 200 -20 240 -10 290 -25"/>
      <path d="M 158 10 C 200 0 240 10 290 -5"/>
      <path d="M -158 -10 C -200 -20 -240 -10 -290 -25"/>
      <path d="M -158 10 C -200 0 -240 10 -290 -5"/>
    </g>
  </g>

  <!-- ===== MIDDLE-BACKGROUND: LARGE PV DIAGRAM behind title (the universal language) ===== -->
  <g transform="translate(400 540)" opacity="0.18">
    <!-- Axes -->
    <line x1="-220" y1="120" x2="220" y2="120" stroke="#e8a857" stroke-width="1"/>
    <line x1="-220" y1="120" x2="-220" y2="-120" stroke="#e8a857" stroke-width="1"/>
    <text x="225" y="132" font-family="'SF Mono', monospace" font-size="14" fill="#e8a857">V</text>
    <text x="-232" y="-122" font-family="'SF Mono', monospace" font-size="14" fill="#e8a857">P</text>

    <!-- Carnot cycle: two isotherms (curves) and two adiabats (steeper curves) -->
    <!-- Isotherm hot (top) -->
    <path d="M -180 -80 C -100 -90 -10 -75 80 -50" fill="none" stroke="#ff6b35" stroke-width="2" opacity="0.9"/>
    <!-- Adiabat right (top to bottom) -->
    <path d="M 80 -50 C 130 -20 160 30 180 60" fill="none" stroke="#e8a857" stroke-width="2" opacity="0.9"/>
    <!-- Isotherm cold (bottom) -->
    <path d="M 180 60 C 110 70 30 65 -60 50" fill="none" stroke="#5ed8ff" stroke-width="2" opacity="0.9"/>
    <!-- Adiabat left (bottom to top) -->
    <path d="M -60 50 C -110 20 -160 -30 -180 -80" fill="none" stroke="#e8a857" stroke-width="2" opacity="0.9"/>

    <!-- State point dots -->
    <circle cx="-180" cy="-80" r="4" fill="#ff6b35"/>
    <circle cx="80" cy="-50" r="4" fill="#ff6b35"/>
    <circle cx="180" cy="60" r="4" fill="#5ed8ff"/>
    <circle cx="-60" cy="50" r="4" fill="#5ed8ff"/>
  </g>

  <!-- ===== LEFT SIDE: VERTICAL PRESSURE GAUGE / TEMPERATURE SCALE ===== -->
  <g transform="translate(75 200)" stroke="#e8a857" opacity="0.28">
    <line x1="0" y1="0" x2="0" y2="700" stroke-width="0.8"/>
    <!-- Major ticks -->
    <line x1="-8" y1="0" x2="0" y2="0" stroke-width="1"/>
    <line x1="-8" y1="100" x2="0" y2="100" stroke-width="1"/>
    <line x1="-8" y1="200" x2="0" y2="200" stroke-width="1"/>
    <line x1="-8" y1="300" x2="0" y2="300" stroke-width="1"/>
    <line x1="-8" y1="400" x2="0" y2="400" stroke-width="1"/>
    <line x1="-8" y1="500" x2="0" y2="500" stroke-width="1"/>
    <line x1="-8" y1="600" x2="0" y2="600" stroke-width="1"/>
    <line x1="-8" y1="700" x2="0" y2="700" stroke-width="1"/>
    <!-- Minor ticks -->
    <line x1="-4" y1="50" x2="0" y2="50" stroke-width="0.6"/>
    <line x1="-4" y1="150" x2="0" y2="150" stroke-width="0.6"/>
    <line x1="-4" y1="250" x2="0" y2="250" stroke-width="0.6"/>
    <line x1="-4" y1="350" x2="0" y2="350" stroke-width="0.6"/>
    <line x1="-4" y1="450" x2="0" y2="450" stroke-width="0.6"/>
    <line x1="-4" y1="550" x2="0" y2="550" stroke-width="0.6"/>
    <line x1="-4" y1="650" x2="0" y2="650" stroke-width="0.6"/>
  </g>
  <!-- Tick labels -->
  <g font-family="'SF Mono', monospace" font-size="9" fill="#e8a857" opacity="0.4" text-anchor="end">
    <text x="60" y="204">300K</text>
    <text x="60" y="404">800K</text>
    <text x="60" y="604">1600K</text>
    <text x="60" y="804">2400K</text>
  </g>

  <!-- ===== RIGHT SIDE: ELECTRIC AC WAVEFORM ===== -->
  <g transform="translate(720 200)" opacity="0.3">
    <line x1="0" y1="0" x2="0" y2="700" stroke="#5ed8ff" stroke-width="0.8"/>
    <!-- Three-phase sine waves running vertically -->
    <path d="M 0 0 Q -10 30 0 60 Q 10 90 0 120 Q -10 150 0 180 Q 10 210 0 240 Q -10 270 0 300 Q 10 330 0 360 Q -10 390 0 420 Q 10 450 0 480 Q -10 510 0 540 Q 10 570 0 600 Q -10 630 0 660 Q 10 690 0 700"
          fill="none" stroke="#5ed8ff" stroke-width="1" opacity="0.6"/>
    <path d="M 0 20 Q 10 50 0 80 Q -10 110 0 140 Q 10 170 0 200 Q -10 230 0 260 Q 10 290 0 320 Q -10 350 0 380 Q 10 410 0 440 Q -10 470 0 500 Q 10 530 0 560 Q -10 590 0 620 Q 10 650 0 680"
          fill="none" stroke="#5ed8ff" stroke-width="0.7" opacity="0.4"/>
    <path d="M 0 -20 Q 10 10 0 40 Q -10 70 0 100 Q 10 130 0 160 Q -10 190 0 220 Q 10 250 0 280 Q -10 310 0 340 Q 10 370 0 400 Q -10 430 0 460 Q 10 490 0 520 Q -10 550 0 580 Q 10 610 0 640 Q -10 670 0 700"
          fill="none" stroke="#5ed8ff" stroke-width="0.7" opacity="0.4"/>
  </g>

  <!-- ===== LOWER ZONE: EVOLUTION OF MACHINES (silhouette row) ===== -->
  <g transform="translate(0 880)">
    <!-- 1. Newcomen piston (steam) -->
    <g transform="translate(110 0)" opacity="0.55">
      <rect x="-18" y="-50" width="36" height="60" fill="none" stroke="#e8a857" stroke-width="1.2"/>
      <rect x="-14" y="-40" width="28" height="20" fill="url(#brass)" opacity="0.5"/>
      <line x1="0" y1="-20" x2="0" y2="20" stroke="#e8a857" stroke-width="2"/>
      <rect x="-22" y="20" width="44" height="6" fill="#e8a857" opacity="0.6"/>
      <text x="0" y="44" font-family="'SF Mono', monospace" font-size="8" fill="#e8a857" opacity="0.7" text-anchor="middle">1712</text>
    </g>
    <!-- 2. Watt rotative beam (transparent gear) -->
    <g transform="translate(220 0)" opacity="0.55">
      <circle cx="0" cy="-20" r="22" fill="none" stroke="#e8a857" stroke-width="1.2"/>
      <circle cx="0" cy="-20" r="6" fill="#e8a857" opacity="0.5"/>
      <line x1="-22" y1="-20" x2="22" y2="-20" stroke="#e8a857" stroke-width="0.8"/>
      <line x1="0" y1="-42" x2="0" y2="2" stroke="#e8a857" stroke-width="0.8"/>
      <line x1="-16" y1="-36" x2="16" y2="-4" stroke="#e8a857" stroke-width="0.8"/>
      <line x1="16" y1="-36" x2="-16" y2="-4" stroke="#e8a857" stroke-width="0.8"/>
      <text x="0" y="44" font-family="'SF Mono', monospace" font-size="8" fill="#e8a857" opacity="0.7" text-anchor="middle">1776</text>
    </g>
    <!-- 3. Otto engine cylinder w/ spark -->
    <g transform="translate(330 0)" opacity="0.55">
      <rect x="-16" y="-50" width="32" height="50" rx="2" fill="none" stroke="#ff8a4a" stroke-width="1.2"/>
      <rect x="-12" y="-30" width="24" height="14" fill="url(#ember)" opacity="0.6"/>
      <line x1="0" y1="-50" x2="0" y2="-58" stroke="#ff8a4a" stroke-width="2"/>
      <circle cx="0" cy="-60" r="3" fill="#ff8a4a" filter="url(#glow)"/>
      <line x1="0" y1="-16" x2="0" y2="20" stroke="#e8a857" stroke-width="2"/>
      <rect x="-22" y="20" width="44" height="6" fill="#e8a857" opacity="0.6"/>
      <text x="0" y="44" font-family="'SF Mono', monospace" font-size="8" fill="#e8a857" opacity="0.7" text-anchor="middle">1876</text>
    </g>
    <!-- 4. Turbine -->
    <g transform="translate(440 0)" opacity="0.55">
      <circle cx="0" cy="-20" r="24" fill="none" stroke="#e8a857" stroke-width="1.2"/>
      <g stroke="#e8a857" stroke-width="0.8" opacity="0.7">
        <line x1="0" y1="-20" x2="20" y2="-20"/>
        <line x1="0" y1="-20" x2="14" y2="-34"/>
        <line x1="0" y1="-20" x2="0" y2="-44"/>
        <line x1="0" y1="-20" x2="-14" y2="-34"/>
        <line x1="0" y1="-20" x2="-20" y2="-20"/>
        <line x1="0" y1="-20" x2="-14" y2="-6"/>
        <line x1="0" y1="-20" x2="0" y2="4"/>
        <line x1="0" y1="-20" x2="14" y2="-6"/>
      </g>
      <circle cx="0" cy="-20" r="4" fill="#e8a857"/>
      <text x="0" y="44" font-family="'SF Mono', monospace" font-size="8" fill="#e8a857" opacity="0.7" text-anchor="middle">1884</text>
    </g>
    <!-- 5. Transformer / electric coil -->
    <g transform="translate(550 0)" opacity="0.55">
      <line x1="-18" y1="-44" x2="-18" y2="4" stroke="#5ed8ff" stroke-width="1.4"/>
      <line x1="18" y1="-44" x2="18" y2="4" stroke="#5ed8ff" stroke-width="1.4"/>
      <g fill="none" stroke="#5ed8ff" stroke-width="1">
        <ellipse cx="-18" cy="-38" rx="8" ry="4"/>
        <ellipse cx="-18" cy="-28" rx="8" ry="4"/>
        <ellipse cx="-18" cy="-18" rx="8" ry="4"/>
        <ellipse cx="-18" cy="-8" rx="8" ry="4"/>
        <ellipse cx="18" cy="-38" rx="8" ry="4"/>
        <ellipse cx="18" cy="-28" rx="8" ry="4"/>
        <ellipse cx="18" cy="-18" rx="8" ry="4"/>
        <ellipse cx="18" cy="-8" rx="8" ry="4"/>
      </g>
      <line x1="-10" y1="-24" x2="10" y2="-24" stroke="#5ed8ff" stroke-width="0.8" opacity="0.5"/>
      <text x="0" y="44" font-family="'SF Mono', monospace" font-size="8" fill="#5ed8ff" opacity="0.7" text-anchor="middle">1896</text>
    </g>
    <!-- 6. Solar cell hex -->
    <g transform="translate(660 0)" opacity="0.55">
      <polygon points="0,-44 22,-32 22,-8 0,4 -22,-8 -22,-32" fill="none" stroke="#5ed8ff" stroke-width="1.2"/>
      <polygon points="0,-44 22,-32 22,-8 0,4 -22,-8 -22,-32" fill="#5ed8ff" opacity="0.15"/>
      <line x1="-22" y1="-32" x2="22" y2="-8" stroke="#5ed8ff" stroke-width="0.5" opacity="0.5"/>
      <line x1="22" y1="-32" x2="-22" y2="-8" stroke="#5ed8ff" stroke-width="0.5" opacity="0.5"/>
      <line x1="0" y1="-44" x2="0" y2="4" stroke="#5ed8ff" stroke-width="0.5" opacity="0.5"/>
      <text x="0" y="44" font-family="'SF Mono', monospace" font-size="8" fill="#5ed8ff" opacity="0.7" text-anchor="middle">1954</text>
    </g>
    <!-- 7. Rocket nozzle / Saturn V -->
    <g transform="translate(750 0)" opacity="0.55">
      <path d="M 0 -50 L -10 -20 L -16 10 L -8 14 L 0 8 L 8 14 L 16 10 L 10 -20 Z"
            fill="none" stroke="#ff8a4a" stroke-width="1.2"/>
      <ellipse cx="0" cy="14" rx="14" ry="3" fill="url(#ember)" opacity="0.7"/>
      <path d="M -8 16 C -10 26 -8 36 -4 44" fill="none" stroke="#ff8a4a" stroke-width="0.8" opacity="0.5"/>
      <path d="M 8 16 C 10 26 8 36 4 44" fill="none" stroke="#ff8a4a" stroke-width="0.8" opacity="0.5"/>
      <text x="0" y="58" font-family="'SF Mono', monospace" font-size="8" fill="#ff8a4a" opacity="0.7" text-anchor="middle">1969</text>
    </g>

    <!-- Connecting line through the timeline -->
    <line x1="80" y1="34" x2="780" y2="34" stroke="#e8a857" stroke-width="0.4" opacity="0.25" stroke-dasharray="4 4"/>
  </g>

  <!-- ===== DECORATIVE EQUATION (subtle background) ===== -->
  <g font-family="'SF Mono', monospace" opacity="0.06" fill="#e8a857">
    <text x="80" y="100" font-size="11">PV = nRT</text>
    <text x="600" y="100" font-size="11">η = 1 − T_C/T_H</text>
    <text x="80" y="1010" font-size="11">dU = δQ − δW</text>
    <text x="540" y="1010" font-size="11">Δv = v_e ln(m₀/m_f)</text>
  </g>

  <!-- ===== TITLE BACKDROP ===== -->
  <rect x="80" y="430" width="640" height="220" rx="4" fill="#0a0610" opacity="0.6" filter="url(#titleBackdrop)"/>

  <!-- ===== TITLE ===== -->
  <text x="400" y="540" text-anchor="middle"
        font-family="'Inter', 'Helvetica Neue', sans-serif"
        font-size="92" letter-spacing="4" font-weight="700">
    <tspan fill="#f0e6d2">Chasing </tspan><tspan fill="url(#brass)">Carnot</tspan>
  </text>

  <!-- Decorative line under title -->
  <line x1="200" y1="580" x2="600" y2="580" stroke="url(#brass)" stroke-width="1.5" opacity="0.6"/>

  <!-- Subtitle -->
  <text x="400" y="618" text-anchor="middle"
        font-family="'Inter', 'Helvetica Neue', sans-serif"
        font-size="20" fill="#c4b292" letter-spacing="2">A Father's Guide to How Humans</text>
  <text x="400" y="646" text-anchor="middle"
        font-family="'Inter', 'Helvetica Neue', sans-serif"
        font-size="20" fill="#c4b292" letter-spacing="2">Turned Energy Into Civilization</text>

  <!-- Tagline -->
  <text x="400" y="694" text-anchor="middle"
        font-family="'Inter', 'Helvetica Neue', sans-serif"
        font-size="13" fill="#9b8c75" letter-spacing="3" opacity="0.75">33 MACHINES · 32 EQUATIONS · 350 YEARS</text>

  <!-- ===== MACHINE CREDITS LIST (lower-bottom) ===== -->
  <g font-family="'SF Mono', monospace" font-size="10" fill="#9b8c75" text-anchor="middle" letter-spacing="1.2">
    <text x="400" y="1010" opacity="0.5">Newcomen · Watt · Carnot · Joule · Otto · Diesel · Benz</text>
    <text x="400" y="1030" opacity="0.4">Parsons · Whittle · von Ohain · Volta · Faraday · Tesla</text>
    <text x="400" y="1050" opacity="0.3">Bessemer · Haber · Carrier · Bell Labs · Goodenough · Fermi · von Braun</text>
  </g>

  <!-- ===== AUTHOR ===== -->
  <text x="400" y="1090" text-anchor="middle"
        font-family="'Inter', 'Helvetica Neue', sans-serif"
        font-size="18" fill="#c4b292" letter-spacing="4">Tian Chen</text>
  <line x1="350" y1="1102" x2="450" y2="1102" stroke="#e8a857" stroke-width="0.8" opacity="0.4"/>

  <!-- Border -->
  <rect x="30" y="30" width="740" height="1060" fill="none" stroke="#3a3220" stroke-width="0.5" opacity="0.5"/>
  <rect x="35" y="35" width="730" height="1050" fill="none" stroke="#3a3220" stroke-width="0.3" opacity="0.3"/>
</svg>
