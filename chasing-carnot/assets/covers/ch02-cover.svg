<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1120" viewBox="0 0 800 1120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#0c0810"/>
      <stop offset="45%" stop-color="#1a1008"/>
      <stop offset="100%" stop-color="#080c14"/>
    </linearGradient>
    <linearGradient id="brass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5c97a"/>
      <stop offset="60%" stop-color="#e8a857"/>
      <stop offset="100%" stop-color="#b07a32"/>
    </linearGradient>
    <linearGradient id="mercury" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4d4dc"/>
      <stop offset="100%" stop-color="#6a6a72"/>
    </linearGradient>
    <radialGradient id="forgeGlow" cx="0.5" cy="1" r="0.7">
      <stop offset="0%" stop-color="#ff6b35" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <pattern id="blueprint" width="40" height="40" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="40" y2="0" stroke="#3a4a52" stroke-width="0.5" opacity="0.25"/>
      <line x1="0" y1="0" x2="0" y2="40" stroke="#3a4a52" stroke-width="0.5" opacity="0.25"/>
    </pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="800" height="1120" fill="url(#bg)"/>
  <rect width="800" height="1120" fill="url(#blueprint)"/>
  <rect width="800" height="1120" fill="url(#forgeGlow)"/>
  <rect x="30" y="30" width="740" height="1060" fill="none" stroke="#3a3220" stroke-width="0.5" opacity="0.5" rx="2"/>
  <rect x="112" y="0" width="3" height="1120" fill="#e8a857"/>

  <text x="200" y="700" font-family="'JetBrains Mono', 'Menlo', monospace" font-size="36" fill="#e8a857" opacity="0.06"
        transform="rotate(-12, 400, 700)">P = ρ g h    W = ∮ P dV</text>

  <!-- ===== UPPER: TORRICELLI BAROMETER + MAGDEBURG HEMISPHERES ===== -->
  <!-- Barometer (left) -->
  <g transform="translate(240 70)" opacity="0.85">
    <!-- Reservoir -->
    <ellipse cx="0" cy="220" rx="48" ry="11" fill="none" stroke="#e8a857" stroke-width="1.4"/>
    <path d="M -48 220 L -40 246 L 40 246 L 48 220" fill="none" stroke="#e8a857" stroke-width="1.4"/>
    <!-- Mercury in reservoir -->
    <ellipse cx="0" cy="232" rx="38" ry="8" fill="url(#mercury)" opacity="0.7"/>
    <path d="M -37 232 L -32 244 L 32 244 L 37 232" fill="url(#mercury)" opacity="0.7"/>
    <!-- Glass tube -->
    <line x1="-7" y1="20" x2="-7" y2="220" stroke="#e8a857" stroke-width="1.2" opacity="0.7"/>
    <line x1="7" y1="20" x2="7" y2="220" stroke="#e8a857" stroke-width="1.2" opacity="0.7"/>
    <ellipse cx="0" cy="20" rx="7" ry="3" fill="none" stroke="#e8a857" stroke-width="1" opacity="0.6"/>
    <!-- Mercury column inside -->
    <rect x="-6" y="50" width="12" height="170" fill="url(#mercury)" opacity="0.85"/>
    <!-- Vacuum at top -->
    <rect x="-6" y="20" width="12" height="30" fill="#0a0610" opacity="0.6"/>
    <text x="18" y="38" font-family="'SF Mono', monospace" font-size="9" fill="#e8a857" opacity="0.6">vacuum</text>
    <!-- Height label -->
    <line x1="48" y1="50" x2="48" y2="232" stroke="#e8a857" stroke-width="0.6" opacity="0.5" stroke-dasharray="3 3"/>
    <line x1="44" y1="50" x2="52" y2="50" stroke="#e8a857" stroke-width="0.8" opacity="0.5"/>
    <line x1="44" y1="232" x2="52" y2="232" stroke="#e8a857" stroke-width="0.8" opacity="0.5"/>
    <text x="58" y="138" font-family="'SF Mono', monospace" font-size="11" fill="#e8a857" opacity="0.7">760 mm</text>
    <text x="58" y="154" font-family="'SF Mono', monospace" font-size="11" fill="#e8a857" opacity="0.7">Hg</text>
  </g>

  <!-- Magdeburg hemispheres (right) -->
  <g transform="translate(560 180)" opacity="0.85">
    <!-- Two hemispheres joined -->
    <path d="M 0 0 A 70 70 0 0 0 0 -100 L 0 0 Z" fill="url(#brass)" opacity="0.35" transform="translate(-2 50)"/>
    <path d="M 0 0 A 70 70 0 0 1 0 -100 L 0 0 Z" fill="url(#brass)" opacity="0.35" transform="translate(2 50)"/>
    <circle cx="0" cy="0" r="70" fill="none" stroke="#e8a857" stroke-width="1.4" opacity="0.7"/>
    <line x1="0" y1="-70" x2="0" y2="70" stroke="#e8a857" stroke-width="1.2" opacity="0.6" stroke-dasharray="2 3"/>
    <!-- Rings (rim) -->
    <ellipse cx="0" cy="0" rx="70" ry="6" fill="none" stroke="#e8a857" stroke-width="1.2" opacity="0.6"/>
    <!-- Pull rings + ropes -->
    <circle cx="-86" cy="0" r="6" fill="none" stroke="#e8a857" stroke-width="1.2" opacity="0.6"/>
    <circle cx="86" cy="0" r="6" fill="none" stroke="#e8a857" stroke-width="1.2" opacity="0.6"/>
    <line x1="-92" y1="0" x2="-72" y2="0" stroke="#e8a857" stroke-width="1.2" opacity="0.6"/>
    <line x1="92" y1="0" x2="72" y2="0" stroke="#e8a857" stroke-width="1.2" opacity="0.6"/>
    <!-- Force arrows (8 horses each side) -->
    <g stroke="#ff6b35" stroke-width="1.4" opacity="0.7" fill="none">
      <line x1="-100" y1="0" x2="-140" y2="0"/>
      <polygon points="-138 -3 -130 0 -138 3" fill="#ff6b35"/>
      <line x1="100" y1="0" x2="140" y2="0"/>
      <polygon points="138 -3 130 0 138 3" fill="#ff6b35"/>
    </g>
    <text x="-145" y="-12" font-family="'SF Mono', monospace" font-size="9" fill="#ff6b35" opacity="0.7">8 horses</text>
    <text x="100" y="-12" font-family="'SF Mono', monospace" font-size="9" fill="#ff6b35" opacity="0.7">8 horses</text>
    <text x="-30" y="100" font-family="'SF Mono', monospace" font-size="9" fill="#e8a857" opacity="0.6">Magdeburg 1654</text>
  </g>

  <!-- ===== TITLE ZONE ===== -->
  <text x="140" y="380" font-family="'SF Mono', monospace" font-size="36" fill="#e8a857" letter-spacing="6">PART 2</text>
  <text x="140" y="446" font-family="'Inter', sans-serif" font-size="44" fill="#f0e6d2" font-weight="bold">Pressure and Vacuum</text>
  <text x="140" y="488" font-family="'Inter', sans-serif" font-size="17" fill="#9b8c75" letter-spacing="2">Letting the atmosphere do work for you</text>
  <line x1="140" y1="516" x2="320" y2="516" stroke="#e8a857" stroke-width="1.5" opacity="0.5"/>

  <!-- ===== LOWER: WATT'S INDICATOR DIAGRAM (PV PLOT) ===== -->
  <g transform="translate(180 620)" opacity="0.85">
    <!-- Axes -->
    <line x1="0" y1="0" x2="0" y2="280" stroke="#e8a857" stroke-width="1.4"/>
    <line x1="0" y1="280" x2="450" y2="280" stroke="#e8a857" stroke-width="1.4"/>
    <text x="-30" y="10" font-family="'SF Mono', monospace" font-size="14" fill="#e8a857">P</text>
    <text x="455" y="296" font-family="'SF Mono', monospace" font-size="14" fill="#e8a857">V</text>

    <!-- Atmospheric line (dashed reference) -->
    <line x1="0" y1="200" x2="450" y2="200" stroke="#9b8c75" stroke-width="0.6" opacity="0.5" stroke-dasharray="3 3"/>
    <text x="455" y="205" font-family="'SF Mono', monospace" font-size="9" fill="#9b8c75" opacity="0.7">P_atm</text>

    <!-- Newcomen-style cycle (rectangular-ish) -->
    <path d="M 60 100 L 380 100 L 380 270 L 60 270 Z"
          fill="url(#brass)" fill-opacity="0.18" stroke="#e8a857" stroke-width="2" opacity="0.85"/>

    <!-- Direction arrows on cycle -->
    <polygon points="220 96 230 100 220 104" fill="#e8a857" opacity="0.8"/>
    <polygon points="384 180 380 190 376 180" fill="#e8a857" opacity="0.8"/>
    <polygon points="220 274 210 270 220 266" fill="#e8a857" opacity="0.8"/>
    <polygon points="56 180 60 170 64 180" fill="#e8a857" opacity="0.8"/>

    <!-- Work area shading -->
    <text x="180" y="200" font-family="'Inter', sans-serif" font-size="22" fill="#ff8a4a" opacity="0.85">W = ∮ P dV</text>

    <!-- State labels -->
    <circle cx="60" cy="100" r="4" fill="#ff6b35"/>
    <circle cx="380" cy="100" r="4" fill="#ff6b35"/>
    <circle cx="380" cy="270" r="4" fill="#5ed8ff"/>
    <circle cx="60" cy="270" r="4" fill="#5ed8ff"/>
    <text x="50" y="92" font-family="'SF Mono', monospace" font-size="10" fill="#ff6b35">1</text>
    <text x="386" y="92" font-family="'SF Mono', monospace" font-size="10" fill="#ff6b35">2</text>
    <text x="386" y="284" font-family="'SF Mono', monospace" font-size="10" fill="#5ed8ff">3</text>
    <text x="50" y="284" font-family="'SF Mono', monospace" font-size="10" fill="#5ed8ff">4</text>
  </g>

  <!-- Watt's indicator pencil mechanism (sketch) -->
  <g transform="translate(660 620)" opacity="0.6">
    <text x="-80" y="0" font-family="'SF Mono', monospace" font-size="10" fill="#e8a857" opacity="0.7">WATT INDICATOR</text>
    <text x="-80" y="14" font-family="'SF Mono', monospace" font-size="9" fill="#e8a857" opacity="0.5">~1796</text>
    <!-- Drum -->
    <circle cx="0" cy="80" r="40" fill="none" stroke="#e8a857" stroke-width="1.2"/>
    <circle cx="0" cy="80" r="6" fill="#e8a857" opacity="0.6"/>
    <!-- String to piston -->
    <line x1="-40" y1="80" x2="-80" y2="80" stroke="#e8a857" stroke-width="0.8" stroke-dasharray="3 2"/>
    <!-- Pencil arm -->
    <line x1="0" y1="40" x2="0" y2="20" stroke="#ff8a4a" stroke-width="2"/>
    <circle cx="0" cy="18" r="3" fill="#ff8a4a"/>
    <text x="-10" y="155" font-family="'SF Mono', monospace" font-size="9" fill="#e8a857" opacity="0.6">paper drum</text>
  </g>

  <!-- ===== TIMELINE STRIP ===== -->
  <g font-family="'SF Mono', monospace" font-size="9" fill="#9b8c75" opacity="0.55" letter-spacing="1.5">
    <text x="140" y="1020">1643 · TORRICELLI   1654 · GUERICKE   1712 · NEWCOMEN   1776 · WATT</text>
  </g>
</svg>
