<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1120" viewBox="0 0 800 1120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#0c0810"/>
      <stop offset="45%" stop-color="#1a1008"/>
      <stop offset="100%" stop-color="#080c14"/>
    </linearGradient>
    <linearGradient id="brass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5c97a"/>
      <stop offset="60%" stop-color="#e8a857"/>
      <stop offset="100%" stop-color="#b07a32"/>
    </linearGradient>
    <linearGradient id="hotcold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#5ed8ff"/>
    </linearGradient>
    <radialGradient id="forgeGlow" cx="0.5" cy="1" r="0.7">
      <stop offset="0%" stop-color="#ff6b35" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <pattern id="blueprint" width="40" height="40" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="40" y2="0" stroke="#3a4a52" stroke-width="0.5" opacity="0.25"/>
      <line x1="0" y1="0" x2="0" y2="40" stroke="#3a4a52" stroke-width="0.5" opacity="0.25"/>
    </pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="800" height="1120" fill="url(#bg)"/>
  <rect width="800" height="1120" fill="url(#blueprint)"/>
  <rect width="800" height="1120" fill="url(#forgeGlow)"/>
  <rect x="30" y="30" width="740" height="1060" fill="none" stroke="#3a3220" stroke-width="0.5" opacity="0.5" rx="2"/>
  <rect x="112" y="0" width="3" height="1120" fill="#e8a857"/>

  <text x="200" y="700" font-family="'JetBrains Mono', 'Menlo', monospace" font-size="32" fill="#e8a857" opacity="0.06"
        transform="rotate(-12, 400, 700)">η = 1 − T_C / T_H</text>

  <!-- ===== UPPER: CARNOT CYCLE — THE WALL ===== -->
  <g transform="translate(400 220)" opacity="0.95">
    <!-- Axes -->
    <line x1="-220" y1="120" x2="220" y2="120" stroke="#e8a857" stroke-width="1.4"/>
    <line x1="-220" y1="120" x2="-220" y2="-120" stroke="#e8a857" stroke-width="1.4"/>
    <text x="-244" y="-110" font-family="'SF Mono', monospace" font-size="14" fill="#e8a857">P</text>
    <text x="226" y="132" font-family="'SF Mono', monospace" font-size="14" fill="#e8a857">V</text>

    <!-- Hot isotherm -->
    <path d="M -180 -85 C -100 -98 -10 -85 80 -55" fill="none" stroke="#ff6b35" stroke-width="2.4" opacity="0.95" filter="url(#glow)"/>
    <text x="-170" y="-95" font-family="'SF Mono', monospace" font-size="11" fill="#ff6b35">T_H</text>
    <!-- Adiabat compression -->
    <path d="M 80 -55 C 130 -25 160 25 180 60" fill="none" stroke="#e8a857" stroke-width="2" opacity="0.9"/>
    <!-- Cold isotherm -->
    <path d="M 180 60 C 110 70 30 65 -60 50" fill="none" stroke="#5ed8ff" stroke-width="2.4" opacity="0.95" filter="url(#glow)"/>
    <text x="160" y="80" font-family="'SF Mono', monospace" font-size="11" fill="#5ed8ff">T_C</text>
    <!-- Adiabat expansion -->
    <path d="M -60 50 C -110 20 -160 -30 -180 -85" fill="none" stroke="#e8a857" stroke-width="2" opacity="0.9"/>

    <!-- Direction arrows -->
    <polygon points="-50 -91 -42 -86 -50 -81" fill="#ff6b35"/>
    <polygon points="135 -10 142 0 130 4" fill="#e8a857"/>
    <polygon points="50 64 42 60 50 56" fill="#5ed8ff"/>
    <polygon points="-135 0 -142 -8 -130 -12" fill="#e8a857"/>

    <!-- State point labels -->
    <circle cx="-180" cy="-85" r="4" fill="#ff6b35"/>
    <circle cx="80" cy="-55" r="4" fill="#ff6b35"/>
    <circle cx="180" cy="60" r="4" fill="#5ed8ff"/>
    <circle cx="-60" cy="50" r="4" fill="#5ed8ff"/>
    <text x="-186" y="-94" font-family="'SF Mono', monospace" font-size="10" fill="#ff6b35">A</text>
    <text x="86" y="-58" font-family="'SF Mono', monospace" font-size="10" fill="#ff6b35">B</text>
    <text x="186" y="64" font-family="'SF Mono', monospace" font-size="10" fill="#5ed8ff">C</text>
    <text x="-66" y="44" font-family="'SF Mono', monospace" font-size="10" fill="#5ed8ff">D</text>

    <!-- W_net annotation -->
    <text x="-50" y="0" font-family="'Inter', sans-serif" font-size="20" fill="#e8a857" opacity="0.8">W_net</text>
  </g>

  <!-- ===== TITLE ZONE ===== -->
  <text x="140" y="430" font-family="'SF Mono', monospace" font-size="36" fill="#e8a857" letter-spacing="6">PART 3</text>
  <text x="140" y="496" font-family="'Inter', sans-serif" font-size="46" fill="#f0e6d2" font-weight="bold">The Laws of Heat</text>
  <text x="140" y="538" font-family="'Inter', sans-serif" font-size="17" fill="#9b8c75" letter-spacing="2">Carnot draws a wall no engine can cross</text>
  <line x1="140" y1="566" x2="320" y2="566" stroke="#e8a857" stroke-width="1.5" opacity="0.5"/>

  <!-- ===== LOWER: ENTROPY SPIRAL + HOT/COLD RESERVOIRS + JOULE PADDLE ===== -->

  <!-- Hot reservoir (left) -->
  <g transform="translate(180 760)" opacity="0.85">
    <rect x="-50" y="0" width="100" height="60" fill="url(#brass)" opacity="0.3" stroke="#ff6b35" stroke-width="1.4"/>
    <text x="0" y="36" font-family="'Inter', sans-serif" font-size="16" fill="#ff8a4a" text-anchor="middle">T_H</text>
    <!-- Heat flow arrow Q_H -->
    <line x1="50" y1="30" x2="100" y2="30" stroke="#ff6b35" stroke-width="2"/>
    <polygon points="100 25 112 30 100 35" fill="#ff6b35"/>
    <text x="58" y="22" font-family="'SF Mono', monospace" font-size="10" fill="#ff6b35">Q_H</text>
    <!-- Heat squiggles (radiating heat) -->
    <g stroke="#ff6b35" stroke-width="1" fill="none" opacity="0.6">
      <path d="M -40 -10 Q -36 -16 -32 -10 Q -28 -16 -24 -10"/>
      <path d="M -10 -10 Q -6 -16 -2 -10 Q 2 -16 6 -10"/>
      <path d="M 24 -10 Q 28 -16 32 -10 Q 36 -16 40 -10"/>
    </g>
  </g>

  <!-- Engine in middle -->
  <g transform="translate(380 790)" opacity="0.95">
    <circle cx="0" cy="0" r="50" fill="none" stroke="#e8a857" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="50" fill="url(#brass)" opacity="0.15"/>
    <text x="0" y="6" font-family="'Inter', sans-serif" font-size="14" fill="#e8a857" text-anchor="middle">Engine</text>
    <!-- Work arrow up -->
    <line x1="0" y1="-50" x2="0" y2="-90" stroke="#f5c97a" stroke-width="2.4"/>
    <polygon points="-5 -86 0 -100 5 -86" fill="#f5c97a"/>
    <text x="10" y="-70" font-family="'SF Mono', monospace" font-size="11" fill="#f5c97a">W</text>
  </g>

  <!-- Cold reservoir (right) -->
  <g transform="translate(580 760)" opacity="0.85">
    <rect x="-50" y="0" width="100" height="60" fill="#5ed8ff" opacity="0.15" stroke="#5ed8ff" stroke-width="1.4"/>
    <text x="0" y="36" font-family="'Inter', sans-serif" font-size="16" fill="#5ed8ff" text-anchor="middle">T_C</text>
    <!-- Heat flow arrow Q_C in -->
    <line x1="-100" y1="30" x2="-50" y2="30" stroke="#5ed8ff" stroke-width="2"/>
    <polygon points="-50 25 -38 30 -50 35" fill="#5ed8ff"/>
    <text x="-92" y="22" font-family="'SF Mono', monospace" font-size="10" fill="#5ed8ff">Q_C</text>
  </g>

  <!-- Entropy spiral (bottom) — arrow of time -->
  <g transform="translate(660 950)" opacity="0.7">
    <path d="M 0 0
             m 0 -8
             a 8 8 0 1 1 0 16
             a 14 14 0 1 0 0 -28
             a 20 20 0 1 1 0 40
             a 26 26 0 1 0 0 -52"
          fill="none" stroke="#e8a857" stroke-width="1.2"/>
    <text x="-40" y="36" font-family="'SF Mono', monospace" font-size="9" fill="#e8a857" opacity="0.7">dS ≥ 0</text>
  </g>

  <!-- Joule paddle (bottom-left) -->
  <g transform="translate(170 920)" opacity="0.65">
    <rect x="-20" y="-30" width="40" height="50" fill="none" stroke="#e8a857" stroke-width="1.2"/>
    <line x1="0" y1="-50" x2="0" y2="-30" stroke="#e8a857" stroke-width="1.2"/>
    <!-- Paddle blades -->
    <line x1="-12" y1="-10" x2="12" y2="-10" stroke="#e8a857" stroke-width="1.2"/>
    <line x1="-12" y1="0" x2="12" y2="0" stroke="#e8a857" stroke-width="1.2"/>
    <line x1="-12" y1="10" x2="12" y2="10" stroke="#e8a857" stroke-width="1.2"/>
    <!-- Falling weight -->
    <line x1="0" y1="-60" x2="-30" y2="-60" stroke="#e8a857" stroke-width="0.8"/>
    <line x1="-30" y1="-60" x2="-30" y2="-30" stroke="#e8a857" stroke-width="0.8" stroke-dasharray="2 2"/>
    <rect x="-36" y="-30" width="12" height="14" fill="url(#brass)" opacity="0.7"/>
    <text x="-26" y="40" font-family="'SF Mono', monospace" font-size="9" fill="#e8a857" opacity="0.6" text-anchor="middle">Joule 1843</text>
  </g>

  <!-- ===== TIMELINE STRIP ===== -->
  <g font-family="'SF Mono', monospace" font-size="9" fill="#9b8c75" opacity="0.55" letter-spacing="1.5">
    <text x="140" y="1020">1824 · CARNOT   1843 · JOULE   1865 · CLAUSIUS   1877 · BOLTZMANN</text>
  </g>
</svg>
