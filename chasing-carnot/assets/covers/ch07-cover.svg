<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1120" viewBox="0 0 800 1120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#0c0810"/>
      <stop offset="45%" stop-color="#10141c"/>
      <stop offset="100%" stop-color="#1a0808"/>
    </linearGradient>
    <linearGradient id="brass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5c97a"/>
      <stop offset="60%" stop-color="#e8a857"/>
      <stop offset="100%" stop-color="#b07a32"/>
    </linearGradient>
    <linearGradient id="ember" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff8a4a"/>
      <stop offset="100%" stop-color="#d83a1a"/>
    </linearGradient>
    <linearGradient id="rocketPlume" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffaa0" stop-opacity="0.95"/>
      <stop offset="40%" stop-color="#ff8a4a" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#d83a1a" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="solarGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fffaa0" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="atomGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#5ed8ff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <pattern id="blueprint" width="40" height="40" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="40" y2="0" stroke="#3a4a52" stroke-width="0.5" opacity="0.25"/>
      <line x1="0" y1="0" x2="0" y2="40" stroke="#3a4a52" stroke-width="0.5" opacity="0.25"/>
    </pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="bigGlow"><feGaussianBlur stdDeviation="14"/></filter>
  </defs>

  <rect width="800" height="1120" fill="url(#bg)"/>
  <rect width="800" height="1120" fill="url(#blueprint)"/>
  <circle cx="200" cy="200" r="180" fill="url(#solarGlow)"/>
  <circle cx="600" cy="280" r="160" fill="url(#atomGlow)"/>
  <rect x="30" y="30" width="740" height="1060" fill="none" stroke="#3a3220" stroke-width="0.5" opacity="0.5" rx="2"/>
  <rect x="112" y="0" width="3" height="1120" fill="url(#brass)"/>

  <text x="200" y="700" font-family="'JetBrains Mono', 'Menlo', monospace" font-size="30" fill="#e8a857" opacity="0.06"
        transform="rotate(-12, 400, 700)">Δv = v_e ln(m₀/m_f)    E = mc²</text>

  <!-- ===== UPPER LEFT: SOLAR CELL HEX GRID + PHOTONS ===== -->
  <g transform="translate(190 200)" opacity="0.95">
    <!-- Sun rays / photons coming in -->
    <g stroke="#fffaa0" stroke-width="1.4" opacity="0.7">
      <line x1="-90" y1="-90" x2="-50" y2="-50" filter="url(#glow)"/>
      <line x1="-60" y1="-110" x2="-30" y2="-60" filter="url(#glow)"/>
      <line x1="-20" y1="-120" x2="-10" y2="-60" filter="url(#glow)"/>
      <line x1="40" y1="-120" x2="20" y2="-60" filter="url(#glow)"/>
      <line x1="80" y1="-100" x2="40" y2="-50" filter="url(#glow)"/>
      <polygon points="-50 -50 -52 -57 -45 -55" fill="#fffaa0"/>
      <polygon points="-30 -60 -32 -67 -25 -65" fill="#fffaa0"/>
      <polygon points="-10 -60 -12 -67 -5 -65" fill="#fffaa0"/>
      <polygon points="20 -60 18 -67 25 -65" fill="#fffaa0"/>
      <polygon points="40 -50 38 -57 45 -55" fill="#fffaa0"/>
    </g>

    <!-- Hexagonal solar cell array -->
    <g stroke="#5ed8ff" stroke-width="1.2" fill="#5ed8ff" fill-opacity="0.12" opacity="0.85">
      <polygon points="0,-30 26,-15 26,15 0,30 -26,15 -26,-15"/>
      <polygon points="52,-30 78,-15 78,15 52,30 26,15 26,-15"/>
      <polygon points="-52,-30 -26,-15 -26,15 -52,30 -78,15 -78,-15"/>
      <polygon points="0,30 26,45 26,75 0,90 -26,75 -26,45"/>
      <polygon points="52,30 78,45 78,75 52,90 26,75 26,45"/>
      <polygon points="-52,30 -26,45 -26,75 -52,90 -78,75 -78,45"/>
      <polygon points="0,-90 26,-75 26,-45 0,-30 -26,-45 -26,-75"/>
    </g>
    <!-- Electron flow arrows -->
    <g stroke="#5ed8ff" stroke-width="1" opacity="0.7" fill="none">
      <line x1="0" y1="0" x2="0" y2="60"/>
      <polygon points="-3 56 0 64 3 56" fill="#5ed8ff"/>
    </g>
    <text x="0" y="120" font-family="'SF Mono', monospace" font-size="10" fill="#5ed8ff" opacity="0.7" text-anchor="middle">e⁻</text>
    <text x="-90" y="-100" font-family="'SF Mono', monospace" font-size="10" fill="#fffaa0" opacity="0.85">hν</text>
  </g>

  <!-- ===== UPPER RIGHT: ATOM (FISSION) ===== -->
  <g transform="translate(610 220)" opacity="0.95">
    <!-- Nucleus -->
    <circle cx="0" cy="0" r="14" fill="url(#ember)" opacity="0.85" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="14" fill="none" stroke="#ff8a4a" stroke-width="1.4"/>
    <!-- Inner nucleons -->
    <circle cx="-4" cy="-4" r="3" fill="#fffaa0" opacity="0.7"/>
    <circle cx="4" cy="-4" r="3" fill="#5ed8ff" opacity="0.7"/>
    <circle cx="-4" cy="4" r="3" fill="#5ed8ff" opacity="0.7"/>
    <circle cx="4" cy="4" r="3" fill="#fffaa0" opacity="0.7"/>

    <!-- Electron orbits (3 ellipses at angles) -->
    <g fill="none" stroke="#5ed8ff" stroke-width="0.8" opacity="0.55">
      <ellipse cx="0" cy="0" rx="58" ry="22"/>
      <ellipse cx="0" cy="0" rx="58" ry="22" transform="rotate(60)"/>
      <ellipse cx="0" cy="0" rx="58" ry="22" transform="rotate(-60)"/>
    </g>
    <!-- Electrons -->
    <circle cx="58" cy="0" r="3" fill="#5ed8ff" filter="url(#glow)"/>
    <circle cx="-29" cy="50" r="3" fill="#5ed8ff" filter="url(#glow)"/>
    <circle cx="-29" cy="-50" r="3" fill="#5ed8ff" filter="url(#glow)"/>

    <!-- Fission products (escaping neutrons) -->
    <g stroke="#fffaa0" stroke-width="1" opacity="0.7" fill="none">
      <line x1="14" y1="-14" x2="40" y2="-40"/>
      <line x1="-14" y1="14" x2="-40" y2="40"/>
      <polygon points="40 -40 36 -34 38 -42" fill="#fffaa0"/>
      <polygon points="-40 40 -36 34 -38 42" fill="#fffaa0"/>
    </g>
    <text x="-50" y="-95" font-family="'SF Mono', monospace" font-size="10" fill="#ff8a4a" opacity="0.85">E = mc²</text>
  </g>

  <!-- ===== TITLE ZONE ===== -->
  <text x="140" y="430" font-family="'SF Mono', monospace" font-size="36" fill="#e8a857" letter-spacing="6">PART 7</text>
  <text x="140" y="496" font-family="'Inter', sans-serif" font-size="44" fill="#f0e6d2" font-weight="bold">Beyond Combustion</text>
  <text x="140" y="538" font-family="'Inter', sans-serif" font-size="17" fill="#9b8c75" letter-spacing="2">Steel, bread, photons, atoms — and leaving the planet</text>
  <line x1="140" y1="566" x2="320" y2="566" stroke="#e8a857" stroke-width="1.5" opacity="0.5"/>

  <!-- ===== LOWER: SATURN V WITH ROCKET PLUME + EARTH HORIZON ===== -->

  <!-- Earth horizon arc -->
  <g transform="translate(400 1100)" opacity="0.7">
    <path d="M -480 0 A 600 600 0 0 1 480 0 L 480 60 L -480 60 Z"
          fill="#1a3040" opacity="0.4"/>
    <path d="M -480 0 A 600 600 0 0 1 480 0"
          fill="none" stroke="#5ed8ff" stroke-width="1" opacity="0.6"/>
    <!-- Atmosphere glow above horizon -->
    <path d="M -300 -10 A 400 400 0 0 1 300 -10"
          fill="none" stroke="#5ed8ff" stroke-width="2" opacity="0.3" filter="url(#bigGlow)"/>
  </g>

  <!-- Rocket trajectory arc -->
  <path d="M 220 920 Q 350 700 540 640 Q 620 620 700 660"
        fill="none" stroke="#e8a857" stroke-width="1" opacity="0.5" stroke-dasharray="4 4"/>

  <!-- Saturn V (right of center, ascending) -->
  <g transform="translate(540 760) rotate(-15)" opacity="0.95">
    <!-- Rocket body (3 stages stacked) -->
    <!-- 3rd stage / SLA / CSM (top) -->
    <polygon points="-12 -100 12 -100 8 -130 0 -140 -8 -130" fill="url(#brass)" stroke="#e8a857" stroke-width="1"/>
    <!-- 3rd stage cylinder -->
    <rect x="-14" y="-100" width="28" height="30" fill="#d4d4dc" opacity="0.85" stroke="#e8a857" stroke-width="0.8"/>
    <!-- 2nd stage -->
    <rect x="-18" y="-70" width="36" height="48" fill="#9b8c75" opacity="0.9" stroke="#e8a857" stroke-width="0.8"/>
    <text x="-1" y="-46" font-family="'SF Mono', monospace" font-size="6" fill="#0a0610" text-anchor="middle">USA</text>
    <!-- Inter-stage ring -->
    <line x1="-18" y1="-22" x2="18" y2="-22" stroke="#e8a857" stroke-width="0.8"/>
    <!-- 1st stage (largest) -->
    <rect x="-22" y="-22" width="44" height="68" fill="#d4d4dc" opacity="0.85" stroke="#e8a857" stroke-width="1"/>
    <text x="0" y="0" font-family="'SF Mono', monospace" font-size="7" fill="#0a0610" text-anchor="middle">SATURN V</text>
    <text x="0" y="14" font-family="'SF Mono', monospace" font-size="6" fill="#0a0610" text-anchor="middle">APOLLO 11</text>
    <!-- Fins -->
    <polygon points="-22 30 -34 50 -22 46" fill="#9b8c75" opacity="0.85" stroke="#e8a857" stroke-width="0.6"/>
    <polygon points="22 30 34 50 22 46" fill="#9b8c75" opacity="0.85" stroke="#e8a857" stroke-width="0.6"/>
    <!-- F-1 engine bells (5) -->
    <g stroke="#e8a857" stroke-width="0.6" fill="none">
      <ellipse cx="-12" cy="50" rx="6" ry="4"/>
      <ellipse cx="0" cy="52" rx="6" ry="4"/>
      <ellipse cx="12" cy="50" rx="6" ry="4"/>
    </g>

    <!-- ROCKET PLUME -->
    <path d="M -22 50 L -50 130 L -30 200 L 0 240 L 30 200 L 50 130 L 22 50 Z"
          fill="url(#rocketPlume)" filter="url(#glow)"/>
    <!-- Plume bright core -->
    <path d="M -10 50 L -16 100 L 0 160 L 16 100 L 10 50 Z"
          fill="#fffaa0" opacity="0.85"/>
    <!-- Shock diamonds -->
    <ellipse cx="0" cy="100" rx="10" ry="3" fill="#fffaa0" opacity="0.6"/>
    <ellipse cx="0" cy="130" rx="14" ry="4" fill="#fffaa0" opacity="0.4"/>
    <ellipse cx="0" cy="170" rx="18" ry="5" fill="#fffaa0" opacity="0.25"/>

    <!-- Δv velocity arrow -->
    <line x1="40" y1="-110" x2="80" y2="-160" stroke="#e8a857" stroke-width="2" opacity="0.85"/>
    <polygon points="76 -158 84 -164 78 -150" fill="#e8a857"/>
    <text x="90" y="-155" font-family="'SF Mono', monospace" font-size="11" fill="#e8a857" opacity="0.85" transform="rotate(15 90 -155)">Δv</text>
  </g>

  <!-- Battery cells (lower left, beyond combustion: Li-ion) -->
  <g transform="translate(180 850)" opacity="0.85">
    <!-- 18650 cell silhouette -->
    <rect x="-30" y="-10" width="80" height="22" rx="3" fill="url(#brass)" opacity="0.6" stroke="#e8a857" stroke-width="1.2"/>
    <!-- Positive terminal -->
    <rect x="50" y="-4" width="6" height="10" fill="#e8a857"/>
    <!-- Cell label -->
    <text x="10" y="4" font-family="'SF Mono', monospace" font-size="8" fill="#0a0610" text-anchor="middle">Li-ion</text>

    <!-- Energy density bars / comparison -->
    <text x="-30" y="34" font-family="'SF Mono', monospace" font-size="9" fill="#9b8c75" opacity="0.7">250 Wh/kg</text>
    <line x1="-30" y1="44" x2="50" y2="44" stroke="#9b8c75" stroke-width="0.5" opacity="0.5"/>
    <text x="-30" y="58" font-family="'SF Mono', monospace" font-size="8" fill="#5ed8ff" opacity="0.6">vs petrol: 12,000 Wh/kg</text>
    <text x="-30" y="72" font-family="'SF Mono', monospace" font-size="8" fill="#5ed8ff" opacity="0.5">but 90% efficient</text>
  </g>

  <!-- Heat pump (Carnot in reverse) - bottom-center -->
  <g transform="translate(380 870)" opacity="0.7">
    <text x="0" y="-26" font-family="'SF Mono', monospace" font-size="10" fill="#5ed8ff" opacity="0.7" text-anchor="middle">CARNOT IN REVERSE</text>
    <circle cx="0" cy="0" r="22" fill="none" stroke="#5ed8ff" stroke-width="1.4"/>
    <text x="0" y="4" font-family="'Inter', sans-serif" font-size="10" fill="#5ed8ff" text-anchor="middle">COP</text>
    <!-- Reverse arrows -->
    <path d="M 30 -8 A 18 18 0 0 0 28 -22" fill="none" stroke="#5ed8ff" stroke-width="1"/>
    <polygon points="28 -22 25 -16 32 -18" fill="#5ed8ff"/>
    <text x="38" y="14" font-family="'SF Mono', monospace" font-size="9" fill="#5ed8ff" opacity="0.7">T_C/(T_H − T_C)</text>
  </g>

  <!-- ===== TIMELINE STRIP ===== -->
  <g font-family="'SF Mono', monospace" font-size="9" fill="#9b8c75" opacity="0.55" letter-spacing="1.5">
    <text x="140" y="1020">1856 · BESSEMER   1902 · CARRIER   1913 · HABER   1942 · FERMI   1954 · BELL LABS   1969 · SATURN V   1991 · LI-ION</text>
  </g>
</svg>
