<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1120" viewBox="0 0 800 1120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#0c0810"/>
      <stop offset="45%" stop-color="#1a1008"/>
      <stop offset="100%" stop-color="#080c14"/>
    </linearGradient>
    <linearGradient id="brass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5c97a"/>
      <stop offset="60%" stop-color="#e8a857"/>
      <stop offset="100%" stop-color="#b07a32"/>
    </linearGradient>
    <linearGradient id="ember" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff8a4a"/>
      <stop offset="100%" stop-color="#d83a1a"/>
    </linearGradient>
    <linearGradient id="exhaust" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff8a4a" stop-opacity="0.9"/>
      <stop offset="80%" stop-color="#5ed8ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#5ed8ff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="forgeGlow" cx="0.5" cy="1" r="0.7">
      <stop offset="0%" stop-color="#ff6b35" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <pattern id="blueprint" width="40" height="40" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="40" y2="0" stroke="#3a4a52" stroke-width="0.5" opacity="0.25"/>
      <line x1="0" y1="0" x2="0" y2="40" stroke="#3a4a52" stroke-width="0.5" opacity="0.25"/>
    </pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="bigGlow"><feGaussianBlur stdDeviation="14"/></filter>
  </defs>

  <rect width="800" height="1120" fill="url(#bg)"/>
  <rect width="800" height="1120" fill="url(#blueprint)"/>
  <rect width="800" height="1120" fill="url(#forgeGlow)"/>
  <rect x="30" y="30" width="740" height="1060" fill="none" stroke="#3a3220" stroke-width="0.5" opacity="0.5" rx="2"/>
  <rect x="112" y="0" width="3" height="1120" fill="#ff6b35"/>

  <text x="200" y="700" font-family="'JetBrains Mono', 'Menlo', monospace" font-size="30" fill="#e8a857" opacity="0.06"
        transform="rotate(-12, 400, 700)">F = ṁ(v_e − v_∞) + (p_e − p_∞)A_e</text>

  <!-- Combustion glow at front of engine -->
  <ellipse cx="240" cy="200" rx="80" ry="50" fill="#ff6b35" opacity="0.25" filter="url(#bigGlow)"/>

  <!-- ===== UPPER: JET ENGINE / GAS TURBINE CROSS-SECTION ===== -->
  <g transform="translate(140 130)" opacity="0.95">
    <!-- Engine outer casing -->
    <path d="M 0 60 C 0 30 30 20 60 20
             L 540 20 C 580 20 600 50 600 70
             L 600 130 C 600 150 580 180 540 180
             L 60 180 C 30 180 0 170 0 140 Z"
          fill="none" stroke="#e8a857" stroke-width="1.6" opacity="0.85"/>

    <!-- Inner shaft -->
    <line x1="0" y1="100" x2="600" y2="100" stroke="#e8a857" stroke-width="2" opacity="0.5" stroke-dasharray="4 3"/>

    <!-- Inlet (left): air intake arrows -->
    <g stroke="#5ed8ff" stroke-width="1.5" opacity="0.7">
      <line x1="-30" y1="60" x2="20" y2="60"/>
      <line x1="-30" y1="80" x2="20" y2="80"/>
      <line x1="-30" y1="100" x2="20" y2="100"/>
      <line x1="-30" y1="120" x2="20" y2="120"/>
      <line x1="-30" y1="140" x2="20" y2="140"/>
      <polygon points="20 56 28 60 20 64" fill="#5ed8ff"/>
      <polygon points="20 76 28 80 20 84" fill="#5ed8ff"/>
      <polygon points="20 96 28 100 20 104" fill="#5ed8ff"/>
      <polygon points="20 116 28 120 20 124" fill="#5ed8ff"/>
      <polygon points="20 136 28 140 20 144" fill="#5ed8ff"/>
    </g>

    <!-- COMPRESSOR STAGE (multi-stage axial blades, increasing pressure) -->
    <g stroke="#e8a857" stroke-width="1" opacity="0.85">
      <!-- 4 compressor stages, blades getting smaller -->
      <line x1="60" y1="40" x2="60" y2="160"/>
      <line x1="55" y1="40" x2="65" y2="40"/>
      <line x1="55" y1="160" x2="65" y2="160"/>
      <!-- Stator/rotor blades stage 1 -->
      <line x1="50" y1="30" x2="70" y2="50"/>
      <line x1="50" y1="50" x2="70" y2="70"/>
      <line x1="50" y1="70" x2="70" y2="90"/>
      <line x1="50" y1="90" x2="70" y2="110"/>
      <line x1="50" y1="110" x2="70" y2="130"/>
      <line x1="50" y1="130" x2="70" y2="150"/>
      <line x1="50" y1="150" x2="70" y2="170"/>

      <line x1="100" y1="48" x2="100" y2="152"/>
      <line x1="92" y1="40" x2="108" y2="56"/>
      <line x1="92" y1="60" x2="108" y2="76"/>
      <line x1="92" y1="80" x2="108" y2="96"/>
      <line x1="92" y1="100" x2="108" y2="116"/>
      <line x1="92" y1="120" x2="108" y2="136"/>
      <line x1="92" y1="140" x2="108" y2="156"/>

      <line x1="140" y1="55" x2="140" y2="145"/>
      <line x1="132" y1="48" x2="148" y2="62"/>
      <line x1="132" y1="68" x2="148" y2="82"/>
      <line x1="132" y1="88" x2="148" y2="102"/>
      <line x1="132" y1="108" x2="148" y2="122"/>
      <line x1="132" y1="128" x2="148" y2="142"/>

      <line x1="180" y1="62" x2="180" y2="138"/>
      <line x1="172" y1="56" x2="188" y2="68"/>
      <line x1="172" y1="76" x2="188" y2="88"/>
      <line x1="172" y1="96" x2="188" y2="108"/>
      <line x1="172" y1="116" x2="188" y2="128"/>
    </g>

    <!-- Combustion chamber -->
    <g>
      <ellipse cx="240" cy="100" rx="35" ry="42" fill="url(#ember)" opacity="0.6"/>
      <ellipse cx="240" cy="100" rx="35" ry="42" fill="none" stroke="#ff6b35" stroke-width="1.4"/>
      <!-- Fuel injectors -->
      <line x1="220" y1="60" x2="220" y2="50" stroke="#ff8a4a" stroke-width="1.4"/>
      <line x1="240" y1="58" x2="240" y2="48" stroke="#ff8a4a" stroke-width="1.4"/>
      <line x1="260" y1="60" x2="260" y2="50" stroke="#ff8a4a" stroke-width="1.4"/>
      <!-- Tiny flame particles -->
      <circle cx="232" cy="98" r="2" fill="#fffaa0" opacity="0.8"/>
      <circle cx="248" cy="105" r="1.5" fill="#fffaa0" opacity="0.7"/>
      <circle cx="240" cy="112" r="1.8" fill="#fffaa0" opacity="0.75"/>
    </g>

    <!-- TURBINE STAGE (extracts work from hot gas) -->
    <g stroke="#e8a857" stroke-width="1" opacity="0.85">
      <line x1="320" y1="55" x2="320" y2="145"/>
      <line x1="312" y1="48" x2="328" y2="62"/>
      <line x1="312" y1="68" x2="328" y2="82"/>
      <line x1="312" y1="88" x2="328" y2="102"/>
      <line x1="312" y1="108" x2="328" y2="122"/>
      <line x1="312" y1="128" x2="328" y2="142"/>

      <line x1="370" y1="48" x2="370" y2="152"/>
      <line x1="360" y1="40" x2="380" y2="56"/>
      <line x1="360" y1="60" x2="380" y2="76"/>
      <line x1="360" y1="80" x2="380" y2="96"/>
      <line x1="360" y1="100" x2="380" y2="116"/>
      <line x1="360" y1="120" x2="380" y2="136"/>
      <line x1="360" y1="140" x2="380" y2="156"/>

      <line x1="420" y1="40" x2="420" y2="160"/>
      <line x1="408" y1="32" x2="432" y2="50"/>
      <line x1="408" y1="56" x2="432" y2="74"/>
      <line x1="408" y1="80" x2="432" y2="98"/>
      <line x1="408" y1="104" x2="432" y2="122"/>
      <line x1="408" y1="128" x2="432" y2="146"/>
    </g>

    <!-- Exhaust nozzle (right) - exhaust plume -->
    <path d="M 540 50 L 600 30 L 720 70 L 720 130 L 600 170 L 540 150 Z"
          fill="url(#exhaust)" opacity="0.55"/>

    <!-- Exhaust velocity arrows -->
    <g stroke="#ff8a4a" stroke-width="1.5" opacity="0.85">
      <line x1="610" y1="60" x2="700" y2="60"/>
      <line x1="610" y1="80" x2="710" y2="80"/>
      <line x1="610" y1="100" x2="720" y2="100"/>
      <line x1="610" y1="120" x2="710" y2="120"/>
      <line x1="610" y1="140" x2="700" y2="140"/>
      <polygon points="700 56 712 60 700 64" fill="#ff8a4a"/>
      <polygon points="710 76 722 80 710 84" fill="#ff8a4a"/>
      <polygon points="720 96 732 100 720 104" fill="#ff8a4a"/>
      <polygon points="710 116 722 120 710 124" fill="#ff8a4a"/>
      <polygon points="700 136 712 140 700 144" fill="#ff8a4a"/>
    </g>

    <!-- Stage labels -->
    <text x="100" y="200" font-family="'SF Mono', monospace" font-size="9" fill="#5ed8ff" opacity="0.65" text-anchor="middle">COMPRESS</text>
    <text x="240" y="200" font-family="'SF Mono', monospace" font-size="9" fill="#ff6b35" opacity="0.7" text-anchor="middle">BURN</text>
    <text x="380" y="200" font-family="'SF Mono', monospace" font-size="9" fill="#e8a857" opacity="0.65" text-anchor="middle">EXTRACT WORK</text>
    <text x="640" y="200" font-family="'SF Mono', monospace" font-size="9" fill="#ff8a4a" opacity="0.65" text-anchor="middle">THRUST →</text>
  </g>

  <!-- ===== TITLE ZONE ===== -->
  <text x="140" y="430" font-family="'SF Mono', monospace" font-size="36" fill="#ff8a4a" letter-spacing="6">PART 5</text>
  <text x="140" y="496" font-family="'Inter', sans-serif" font-size="44" fill="#f0e6d2" font-weight="bold">Continuous Flow</text>
  <text x="140" y="538" font-family="'Inter', sans-serif" font-size="17" fill="#9b8c75" letter-spacing="2">Parsons, Whittle, von Ohain — nothing reciprocates, ever</text>
  <line x1="140" y1="566" x2="320" y2="566" stroke="#ff6b35" stroke-width="1.5" opacity="0.6"/>

  <!-- ===== LOWER: BRAYTON CYCLE T-S DIAGRAM + COMBINED CYCLE EFFICIENCY BAR ===== -->
  <g transform="translate(180 660)" opacity="0.9">
    <!-- T-S axes -->
    <line x1="0" y1="0" x2="0" y2="240" stroke="#e8a857" stroke-width="1.4"/>
    <line x1="0" y1="240" x2="280" y2="240" stroke="#e8a857" stroke-width="1.4"/>
    <text x="-26" y="8" font-family="'SF Mono', monospace" font-size="12" fill="#e8a857">T</text>
    <text x="284" y="254" font-family="'SF Mono', monospace" font-size="12" fill="#e8a857">s</text>

    <!-- Brayton cycle: 4 corners -->
    <line x1="40" y1="200" x2="40" y2="120" stroke="#ff8a4a" stroke-width="2"/>
    <path d="M 40 120 C 100 80 180 50 240 30" fill="none" stroke="#ff6b35" stroke-width="2"/>
    <line x1="240" y1="30" x2="240" y2="150" stroke="#ff8a4a" stroke-width="2"/>
    <path d="M 240 150 C 180 180 100 200 40 200" fill="none" stroke="#5ed8ff" stroke-width="2"/>

    <circle cx="40" cy="200" r="3.5" fill="#5ed8ff"/>
    <circle cx="40" cy="120" r="3.5" fill="#e8a857"/>
    <circle cx="240" cy="30" r="3.5" fill="#ff6b35"/>
    <circle cx="240" cy="150" r="3.5" fill="#ff6b35"/>

    <text x="80" y="100" font-family="'Inter', sans-serif" font-size="20" fill="#f5c97a" opacity="0.85">Brayton</text>
    <text x="14" y="280" font-family="'SF Mono', monospace" font-size="10" fill="#9b8c75" opacity="0.7">η = 1 − 1/π^((γ−1)/γ)</text>
  </g>

  <!-- Efficiency bars (right) - simple cycle vs combined cycle -->
  <g transform="translate(520 680)" opacity="0.9">
    <text x="0" y="-15" font-family="'SF Mono', monospace" font-size="11" fill="#e8a857" opacity="0.7">EFFICIENCY</text>
    <line x1="0" y1="0" x2="200" y2="0" stroke="#9b8c75" stroke-width="0.5" opacity="0.5"/>
    <line x1="0" y1="-200" x2="0" y2="0" stroke="#9b8c75" stroke-width="0.5" opacity="0.5"/>

    <!-- 100% reference -->
    <line x1="-4" y1="-200" x2="0" y2="-200" stroke="#9b8c75" stroke-width="0.8" opacity="0.5"/>
    <text x="-26" y="-196" font-family="'SF Mono', monospace" font-size="9" fill="#9b8c75" opacity="0.7">100%</text>

    <!-- Bar 1: Otto -->
    <rect x="14" y="-82" width="34" height="82" fill="url(#brass)" opacity="0.7"/>
    <text x="31" y="14" font-family="'SF Mono', monospace" font-size="9" fill="#e8a857" text-anchor="middle">Otto</text>
    <text x="31" y="-90" font-family="'SF Mono', monospace" font-size="9" fill="#e8a857" text-anchor="middle">41%</text>

    <!-- Bar 2: Rankine -->
    <rect x="62" y="-98" width="34" height="98" fill="url(#brass)" opacity="0.8"/>
    <text x="79" y="14" font-family="'SF Mono', monospace" font-size="9" fill="#e8a857" text-anchor="middle">Rank</text>
    <text x="79" y="-106" font-family="'SF Mono', monospace" font-size="9" fill="#e8a857" text-anchor="middle">49%</text>

    <!-- Bar 3: Simple Brayton -->
    <rect x="110" y="-88" width="34" height="88" fill="#ff6b35" opacity="0.6"/>
    <text x="127" y="14" font-family="'SF Mono', monospace" font-size="9" fill="#ff8a4a" text-anchor="middle">Bray</text>
    <text x="127" y="-96" font-family="'SF Mono', monospace" font-size="9" fill="#ff8a4a" text-anchor="middle">44%</text>

    <!-- Bar 4: Combined -->
    <rect x="158" y="-126" width="34" height="126" fill="#ff6b35" opacity="0.95" filter="url(#glow)"/>
    <text x="175" y="14" font-family="'SF Mono', monospace" font-size="9" fill="#ff8a4a" text-anchor="middle">Comb</text>
    <text x="175" y="-134" font-family="'SF Mono', monospace" font-size="10" fill="#fffaa0" text-anchor="middle">63%</text>

    <text x="100" y="40" font-family="'SF Mono', monospace" font-size="9" fill="#9b8c75" opacity="0.6" text-anchor="middle">heat → mechanical</text>
  </g>

  <!-- ===== TIMELINE STRIP ===== -->
  <g font-family="'SF Mono', monospace" font-size="9" fill="#9b8c75" opacity="0.55" letter-spacing="1.5">
    <text x="140" y="1020">1884 · PARSONS   1939 · VON OHAIN   1941 · WHITTLE   2018 · NISHI-NAGOYA</text>
  </g>
</svg>
