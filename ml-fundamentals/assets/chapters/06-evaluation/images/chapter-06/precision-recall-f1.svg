<text x="90" y="105" fill="#e9eef4" font-size="40" font-family="'Hiragino Sans GB', 'STHeiti', 'Arial Unicode MS', sans-serif" font-weight="700" text-anchor="start" opacity="1">precision 和 recall 从两个方向读四格表</text>
<text x="90" y="150" fill="#9aa8b7" font-size="24" font-family="'Hiragino Sans GB', 'STHeiti', 'Arial Unicode MS', sans-serif" font-weight="400" text-anchor="start" opacity="1">F1 用调和平均惩罚单边极端</text>
<circle cx="360" cy="425" r="150" fill="#132033" stroke="#6ea8fe" stroke-width="5" opacity="1"/>
<text x="360" y="370" fill="#6ea8fe" font-size="36" font-family="'SF Mono', 'Menlo', 'Consolas', monospace" font-weight="700" text-anchor="middle" opacity="1">precision</text>
<text x="360" y="430" fill="#e9eef4" font-size="28" font-family="'SF Mono', 'Menlo', 'Consolas', monospace" font-weight="400" text-anchor="middle" opacity="1">TP / (TP + FP)</text>
<text x="360" y="483" fill="#9aa8b7" font-size="26" font-family="'Hiragino Sans GB', 'STHeiti', 'Arial Unicode MS', sans-serif" font-weight="400" text-anchor="middle" opacity="1">预测为正的一列</text>
<text x="360" y="528" fill="#e9eef4" font-size="25" font-family="'Hiragino Sans GB', 'STHeiti', 'Arial Unicode MS', sans-serif" font-weight="700" text-anchor="middle" opacity="1">出手是否可靠</text>
<circle cx="800" cy="425" r="150" fill="#132033" stroke="#5cc8a7" stroke-width="5" opacity="1"/>
<text x="800" y="370" fill="#5cc8a7" font-size="36" font-family="'SF Mono', 'Menlo', 'Consolas', monospace" font-weight="700" text-anchor="middle" opacity="1">recall</text>
<text x="800" y="430" fill="#e9eef4" font-size="28" font-family="'SF Mono', 'Menlo', 'Consolas', monospace" font-weight="400" text-anchor="middle" opacity="1">TP / (TP + FN)</text>
<text x="800" y="483" fill="#9aa8b7" font-size="26" font-family="'Hiragino Sans GB', 'STHeiti', 'Arial Unicode MS', sans-serif" font-weight="400" text-anchor="middle" opacity="1">真实为正的一行</text>
<text x="800" y="528" fill="#e9eef4" font-size="25" font-family="'Hiragino Sans GB', 'STHeiti', 'Arial Unicode MS', sans-serif" font-weight="700" text-anchor="middle" opacity="1">重要样本找回多少</text>
<circle cx="1240" cy="425" r="150" fill="#132033" stroke="#d7a64a" stroke-width="5" opacity="1"/>
<text x="1240" y="370" fill="#d7a64a" font-size="36" font-family="'SF Mono', 'Menlo', 'Consolas', monospace" font-weight="700" text-anchor="middle" opacity="1">F1</text>
<text x="1240" y="430" fill="#e9eef4" font-size="28" font-family="'SF Mono', 'Menlo', 'Consolas', monospace" font-weight="400" text-anchor="middle" opacity="1">2PR / (P + R)</text>
<text x="1240" y="483" fill="#9aa8b7" font-size="26" font-family="'Hiragino Sans GB', 'STHeiti', 'Arial Unicode MS', sans-serif" font-weight="400" text-anchor="middle" opacity="1">同时看两端</text>
<text x="1240" y="528" fill="#e9eef4" font-size="25" font-family="'Hiragino Sans GB', 'STHeiti', 'Arial Unicode MS', sans-serif" font-weight="700" text-anchor="middle" opacity="1">不喜欢只顾一头</text>
<text x="170" y="705" fill="#e9eef4" font-size="30" font-family="'Hiragino Sans GB', 'STHeiti', 'Arial Unicode MS', sans-serif" font-weight="400" text-anchor="start" opacity="1">例子：precision = 0.40，recall = 0.67，F1 约为 0.50。</text>
<text x="170" y="755" fill="#9aa8b7" font-size="28" font-family="'Hiragino Sans GB', 'STHeiti', 'Arial Unicode MS', sans-serif" font-weight="400" text-anchor="start" opacity="1">若业务代价明显不对称，F1 仍要让位给成本表和阈值选择。</text>
</svg>