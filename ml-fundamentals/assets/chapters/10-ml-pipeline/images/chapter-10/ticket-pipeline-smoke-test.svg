<text x="190" y="800" fill="#9aa8b7" font-size="28" font-family="'Hiragino Sans GB', 'STHeiti', 'Arial Unicode MS', sans-serif" font-weight="400" text-anchor="start" opacity="1">这个练习的重点不是刷高分，而是让别人能复现、能加载、能发现输入契约被破坏。</text>
