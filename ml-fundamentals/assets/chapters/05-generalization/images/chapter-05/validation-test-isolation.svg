<rect x="40" y="40" width="1520" height="820" rx="0" fill="none" stroke="#2e4054" stroke-width="2" opacity="0.75"/>
<text x="90" y="105" fill="#e9eef4" font-size="40" font-family="'Hiragino Sans GB', 'STHeiti', 'Arial Unicode MS', sans-serif" font-weight="700" text-anchor="start" opacity="1">验证集可以反复使用，测试集不能回头污染选择</text>
<text x="90" y="150" fill="#9aa8b7" font-size="24" font-family="'Hiragino Sans GB', 'STHeiti', 'Arial Unicode MS', sans-serif" font-weight="400" text-anchor="start" opacity="1">隔离不是道德要求，而是让最终分数仍然像未知未来</text>
<marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#5cc8a7"/></marker>
<marker id="arrow-red" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#e06c75"/></marker>
<rect x="135" y="350" width="290" height="140" rx="8" fill="#0f1722" stroke="#5cc8a7" stroke-width="4" opacity="1"/>
<text x="280.0" y="408" fill="#5cc8a7" font-size="32" font-family="'Hiragino Sans GB', 'STHeiti', 'Arial Unicode MS', sans-serif" font-weight="700" text-anchor="middle" opacity="1">训练集</text>
<text x="280.0" y="450" fill="#e9eef4" font-size="24" font-family="'Hiragino Sans GB', 'STHeiti', 'Arial Unicode MS', sans-serif" font-weight="400" text-anchor="middle" opacity="1">学习参数</text>
<rect x="540" y="350" width="290" height="140" rx="8" fill="#0f1722" stroke="#6ea8fe" stroke-width="4" opacity="1"/>
<text x="685.0" y="408" fill="#6ea8fe" font-size="32" font-family="'Hiragino Sans GB', 'STHeiti', 'Arial Unicode MS', sans-serif" font-weight="700" text-anchor="middle" opacity="1">验证集</text>
<text x="685.0" y="450" fill="#e9eef4" font-size="24" font-family="'Hiragino Sans GB', 'STHeiti', 'Arial Unicode MS', sans-serif" font-weight="400" text-anchor="middle" opacity="1">选择模型和超参数</text>
<rect x="1070" y="350" width="290" height="140" rx="8" fill="#0f1722" stroke="#d7a64a" stroke-width="4" opacity="1"/>
<text x="1215.0" y="408" fill="#d7a64a" font-size="32" font-family="'Hiragino Sans GB', 'STHeiti', 'Arial Unicode MS', sans-serif" font-weight="700" text-anchor="middle" opacity="1">测试集</text>
<text x="1215.0" y="450" fill="#e9eef4" font-size="24" font-family="'Hiragino Sans GB', 'STHeiti', 'Arial Unicode MS', sans-serif" font-weight="400" text-anchor="middle" opacity="1">最后一次验收</text>
<line x1="425" y1="420" x2="540" y2="420" stroke="#5cc8a7" stroke-width="4" marker-end="url(#arrow-green)" opacity="1"/>
<line x1="830" y1="420" x2="540" y2="420" stroke="#5cc8a7" stroke-width="4" marker-end="url(#arrow-green)" opacity="1"/>
<text x="485" y="330" fill="#5cc8a7" font-size="24" font-family="'Hiragino Sans GB', 'STHeiti', 'Arial Unicode MS', sans-serif" font-weight="700" text-anchor="middle" opacity="1">反复实验</text>
<line x1="880" y1="420" x2="1030" y2="420" stroke="#e06c75" stroke-width="5" opacity="1" stroke-dasharray="12 10"/>
<text x="955" y="385" fill="#e06c75" font-size="23" font-family="'Hiragino Sans GB', 'STHeiti', 'Arial Unicode MS', sans-serif" font-weight="700" text-anchor="middle" opacity="1">不能根据测试分数回退调参</text>
<text x="170" y="620" fill="#e9eef4" font-size="30" font-family="'Hiragino Sans GB', 'STHeiti', 'Arial Unicode MS', sans-serif" font-weight="400" text-anchor="start" opacity="1">如果测试集分数参与了模型选择，它就不再是最后验收，而成了另一块验证集。</text>
<text x="170" y="675" fill="#9aa8b7" font-size="27" font-family="'Hiragino Sans GB', 'STHeiti', 'Arial Unicode MS', sans-serif" font-weight="400" text-anchor="start" opacity="1">严肃项目会把测试集锁到流程末尾，甚至让训练者看不到标签。</text>
</svg>