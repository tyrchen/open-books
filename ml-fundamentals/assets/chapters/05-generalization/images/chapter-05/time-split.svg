<line x1="140" y1="555" x2="1400" y2="555" stroke="#9aa8b7" stroke-width="4" opacity="1"/>
<marker id="arrow-muted" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#9aa8b7"/></marker>
