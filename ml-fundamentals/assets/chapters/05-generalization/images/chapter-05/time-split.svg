<rect x="1211.0" y="380" width="189.0" height="120" rx="4" fill="#132033" stroke="#d7a64a" stroke-width="4" opacity="1"/>
<text x="1305.5" y="423" fill="#d7a64a" font-size="34" font-family="'Hiragino Sans GB', 'STHeiti', 'Arial Unicode MS', sans-serif" font-weight="700" text-anchor="middle" opacity="1">测试</text>
