<text x="1466" y="564" fill="#9aa8b7" font-size="25" font-family="'Hiragino Sans GB', 'STHeiti', 'Arial Unicode MS', sans-serif" font-weight="400" text-anchor="start" opacity="1">未来</text>
<text x="180" y="660" fill="#e9eef4" font-size="30" font-family="'Hiragino Sans GB', 'STHeiti', 'Arial Unicode MS', sans-serif" font-weight="400" text-anchor="start" opacity="1">线上预测永远只知道过去。时间切分让离线评估也遵守同一条物理规则。</text>
<text x="180" y="715" fill="#9aa8b7" font-size="27" font-family="'Hiragino Sans GB', 'STHeiti', 'Arial Unicode MS', sans-serif" font-weight="400" text-anchor="start" opacity="1">如果随机切分，测试样本可能来自训练样本之前，分数会比真实上线更乐观。</text>
