<text x="860" y="365" fill="#9aa8b7" font-size="21" font-family="'SF Mono', 'Menlo', 'Consolas', monospace" font-weight="400" text-anchor="start" opacity="1">候选 2：scaler -&gt; clf(C=1.0)</text>
