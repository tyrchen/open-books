<text x="1475" y="580" fill="#d7a64a" font-size="27" font-family="'Hiragino Sans GB', 'STHeiti', 'Arial Unicode MS', sans-serif" font-weight="700" text-anchor="middle" opacity="1">最终测试分数</text>
<text x="130" y="785" fill="#9aa8b7" font-size="30" font-family="'Hiragino Sans GB', 'STHeiti', 'Arial Unicode MS', sans-serif" font-weight="400" text-anchor="start" opacity="1">关键纪律：搜索可以反复使用训练池，测试集只能给最终流程一次近似未来的审查。</text>
