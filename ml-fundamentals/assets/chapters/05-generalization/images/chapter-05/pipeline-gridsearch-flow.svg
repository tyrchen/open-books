<line x1="1280" y1="430" x2="1280" y2="510" stroke="#6ea8fe" stroke-width="4" marker-end="url(#arrow-blue)" opacity="1"/>
<text x="980" y="675" fill="#e9eef4" font-size="25" font-family="'Hiragino Sans GB', 'STHeiti', 'Arial Unicode MS', sans-serif" font-weight="400" text-anchor="middle" opacity="1">Pipeline 在每一折内部重新 fit 预处理器，验证折只 transform，不学习统计量。</text>
