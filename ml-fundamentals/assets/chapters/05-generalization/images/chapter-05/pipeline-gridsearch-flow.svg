<text x="1027" y="555" fill="#5cc8a7" font-size="17" font-family="'Hiragino Sans GB', 'STHeiti', 'Arial Unicode MS', sans-serif" font-weight="700" text-anchor="middle" opacity="1">训练折 2</text>
<text x="1027" y="590" fill="#e9eef4" font-size="21" font-family="'SF Mono', 'Menlo', 'Consolas', monospace" font-weight="400" text-anchor="middle" opacity="1">fit</text>
<rect x="1110" y="510" width="95" height="115" rx="6" fill="#132033" stroke="#5cc8a7" stroke-width="3" opacity="1"/>
