<rect x="220" y="625" width="1110" height="55" rx="6" fill="#111d2a" stroke="#34475e" stroke-width="2" opacity="1"/>
<text x="250" y="660" fill="#9aa8b7" font-size="23" font-family="'Hiragino Sans GB', 'STHeiti', 'Arial Unicode MS', sans-serif" font-weight="400" text-anchor="start" opacity="1">这只是教学版同现向量；深度 embedding 会用更大的语料和训练目标学习更稳的表示。</text>
<text x="180" y="805" fill="#9aa8b7" font-size="28" font-family="'Hiragino Sans GB', 'STHeiti', 'Arial Unicode MS', sans-serif" font-weight="400" text-anchor="start" opacity="1">embedding 的关键不是“把词变成数字”，而是让训练目标决定哪些对象应该靠近。</text>
