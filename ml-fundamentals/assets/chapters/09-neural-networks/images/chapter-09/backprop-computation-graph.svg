<text x="190" y="800" fill="#9aa8b7" font-size="28" font-family="'Hiragino Sans GB', 'STHeiti', 'Arial Unicode MS', sans-serif" font-weight="400" text-anchor="start" opacity="1">反向传播不是另一种学习方式，它只是把第四章的梯度下降接到多层计算图上。</text>
