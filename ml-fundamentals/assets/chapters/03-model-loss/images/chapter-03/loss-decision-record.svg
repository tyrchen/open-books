<rect x="170" y="600" width="1260" height="118" rx="8" fill="#132033" stroke="#b48cff" stroke-width="3" opacity="1"/>
<text x="800" y="648" fill="#e9eef4" font-size="26" font-family="'Hiragino Sans GB', 'STHeiti', 'Arial Unicode MS', sans-serif" font-weight="700" text-anchor="middle" opacity="1">风控示例：欺诈概率 → 加权交叉熵 → PR-AUC 与误拦率 → 拦截 / 人审 / 放行</text>
<text x="800" y="690" fill="#9aa8b7" font-size="23" font-family="'Hiragino Sans GB', 'STHeiti', 'Arial Unicode MS', sans-serif" font-weight="400" text-anchor="middle" opacity="1">任何一层没有写清，损失函数都会在后续训练、评审或上线动作里变成隐患。</text>
<text x="160" y="805" fill="#9aa8b7" font-size="25" font-family="'Hiragino Sans GB', 'STHeiti', 'Arial Unicode MS', sans-serif" font-weight="400" text-anchor="start" opacity="1">这张图不是算法选择器，而是一份实验记录骨架：每次训练都应能找到四层证据。</text>
</svg>