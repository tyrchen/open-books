<text x="615" y="306" fill="#e9eef4" font-size="31" font-family="'Hiragino Sans GB', 'STHeiti', 'Arial Unicode MS', sans-serif" font-weight="700" text-anchor="middle" opacity="1">训练损失</text>
<text x="615" y="350" fill="#5cc8a7" font-size="22" font-family="'Hiragino Sans GB', 'STHeiti', 'Arial Unicode MS', sans-serif" font-weight="700" text-anchor="middle" opacity="1">优化器看什么</text>
<text x="615" y="410" fill="#9aa8b7" font-size="22" font-family="'Hiragino Sans GB', 'STHeiti', 'Arial Unicode MS', sans-serif" font-weight="400" text-anchor="middle" opacity="1">MAE / MSE / Huber</text>
<text x="615" y="444" fill="#9aa8b7" font-size="22" font-family="'Hiragino Sans GB', 'STHeiti', 'Arial Unicode MS', sans-serif" font-weight="400" text-anchor="middle" opacity="1">交叉熵 / 加权损失</text>
<rect x="845" y="250" width="280" height="260" rx="8" fill="#0f1722" stroke="#d7a64a" stroke-width="3" opacity="1"/>
<text x="985" y="306" fill="#e9eef4" font-size="31" font-family="'Hiragino Sans GB', 'STHeiti', 'Arial Unicode MS', sans-serif" font-weight="700" text-anchor="middle" opacity="1">评估指标</text>
<text x="985" y="350" fill="#d7a64a" font-size="22" font-family="'Hiragino Sans GB', 'STHeiti', 'Arial Unicode MS', sans-serif" font-weight="700" text-anchor="middle" opacity="1">团队怎样验收</text>
<text x="985" y="410" fill="#9aa8b7" font-size="22" font-family="'Hiragino Sans GB', 'STHeiti', 'Arial Unicode MS', sans-serif" font-weight="400" text-anchor="middle" opacity="1">RMSE / PR-AUC</text>
<text x="985" y="444" fill="#9aa8b7" font-size="22" font-family="'Hiragino Sans GB', 'STHeiti', 'Arial Unicode MS', sans-serif" font-weight="400" text-anchor="middle" opacity="1">混淆矩阵 / 切片指标</text>
<rect x="1215" y="250" width="280" height="260" rx="8" fill="#0f1722" stroke="#e06c75" stroke-width="3" opacity="1"/>
<text x="1355" y="306" fill="#e9eef4" font-size="31" font-family="'Hiragino Sans GB', 'STHeiti', 'Arial Unicode MS', sans-serif" font-weight="700" text-anchor="middle" opacity="1">业务动作</text>
