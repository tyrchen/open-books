<text x="800" y="595" fill="#e9eef4" font-size="30" font-family="'Hiragino Sans GB', 'STHeiti', 'Arial Unicode MS', sans-serif" font-weight="700" text-anchor="middle" opacity="1">指标一旦成为目标，就会改变被测量的系统。</text>
<text x="800" y="642" fill="#9aa8b7" font-size="25" font-family="'Hiragino Sans GB', 'STHeiti', 'Arial Unicode MS', sans-serif" font-weight="400" text-anchor="middle" opacity="1">训练损失要能优化；业务验收要能保护真实价值。</text>
