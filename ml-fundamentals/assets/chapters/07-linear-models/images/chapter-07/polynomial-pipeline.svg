<text x="105" y="805" fill="#9aa8b7" font-size="28" font-family="'Hiragino Sans GB', 'STHeiti', 'Arial Unicode MS', sans-serif" font-weight="400" text-anchor="start" opacity="1">顺序不是语法细节：先展开、再缩放、最后训练，所有 fit 都必须只看当前训练折。</text>
