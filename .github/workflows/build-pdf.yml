name: Build Book PDF

on:
  push:
    tags:
      - "*-v*"
  workflow_dispatch:
    inputs:
      book:
        description: "Book directory to build"
        required: true
        default: "chasing-carnot"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: typst-community/setup-typst@v4
        with:
          typst-version: 0.15.0

      - name: Install fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk fonts-noto-core

      - name: Resolve book
        id: book
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            book="${{ inputs.book }}"
          else
            tag="${GITHUB_REF_NAME}"
            book="${tag%-v*}"
          fi

          if [[ -z "$book" || "$book" == "$GITHUB_REF_NAME" ]]; then
            echo "Could not resolve book name from tag '$GITHUB_REF_NAME'" >&2
            exit 1
          fi

          if [[ ! -f "$book/book.typ" ]]; then
            echo "Missing $book/book.typ" >&2
            exit 1
          fi

          echo "book=$book" >> "$GITHUB_OUTPUT"

      - name: Build PDF
        run: make pdf BOOK="${{ steps.book.outputs.book }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.book.outputs.book }}-pdf
          path: dist/${{ steps.book.outputs.book }}.pdf

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ steps.book.outputs.book }}.pdf
